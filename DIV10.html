<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>manipulacija dib elementa javascriptom</title>
</head>
<body>

    <div><img src="dexter.png" alt="Prva slika" width="200"></div>
    <div id="drugaSlika"><img src="doakes.webp" alt="Druga slika" width="200"></div>
    <div><img src="doakes2.webp" alt="Treća slika" width="200"></div>

    <input type="button" value="Sakrij" onclick="window.document.getElementById('drugaSlika').style.visibility='hidden';">
    <input type="button" value="Pokaži" onclick="window.document.getElementById('drugaSlika').style.visibility='visible';">

</body>
</html>
