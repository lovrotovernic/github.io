<html>
<head>
<title>Vježba 14</title>

<style>
body{
    position:relative;
    height:900px;
    background:#e9e9e9;
}

button{
    width:110px;
    height:50px;
    margin:20px 10px;
    font-size:18px;
}

div{
    position:absolute;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

#div1{
    width:200px;
    height:200px;
    top:100px;
    left:100px;
    z-index:1;
    background-image:url("s1.jpg");
}

#div2{
    width:200px;
    height:200px;
    top:150px;
    left:150px;
    z-index:2;
    background-image:url("s2.jpg");
}

#div3{
    width:200px;
    height:200px;
    top:200px;
    left:200px;
    z-index:3;
    background-image:url("s3.jpg");
}

#div4{
    width:200px;
    height:200px;
    top:300px;
    left:350px;
    z-index:4;
    background-image:url("s4.jpg");
}

#div5{
    width:200px;
    height:200px;
    top:300px;
    left:550px;
    z-index:5;
    background-image:url("s5.jpg");
}

#div6{
    width:350px;
    height:200px;
    top:250px;
    left:0px;
    background-color:gray;
    z-index:0;
}

#div1:hover,
#div2:hover,
#div3:hover,
#div4:hover,
#div5:hover,
#div6:hover{
    z-index:100;
}
</style>
</head>

<body>

<button onclick="lijevo()">U lijevo</button>
<button onclick="desno()">U desno</button>

<div id="div1"></div>
<div id="div2"></div>
<div id="div3"></div>
<div id="div4"></div>
<div id="div5"></div>
<div id="div6"></div>

<script>
const siviDiv = document.getElementById("div6");

function lijevo(){
    let x = parseInt(getComputedStyle(siviDiv).left);
    siviDiv.style.left = (x - 20) + "px";
}

function desno(){
    let x = parseInt(getComputedStyle(siviDiv).left);
    siviDiv.style.left = (x + 20) + "px";
}
</script>

</body>
</html>
