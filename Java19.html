<HTML><HEAD><TITLE>Vremenska petlja</TITLE><SCRIPT LANGUAGE="JavaScript">var time;function change(){var broj=window.document.form.tekst.value;broj=parseInt(broj)+1;window.document.form.tekst.value=broj;time=setTimeout("change();",100);}</SCRIPT></HEAD><BODY ><FORM name="form"><input type="text" name="tekst" value=0><BR><input type="button" value="Pokreni štopericu" onClick="change();"><input type="button" value="Zaustavi štopericu" onClick="clearTimeout(time); "></BODY></HTML>
