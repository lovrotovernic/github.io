<HTML><HEAD><TITLE>Prezentacija</TITLE><SCRIPT LANGUAGE="JavaScript">var slike=new Array();slike[0]= new Image();slike[0].src="1.jpg";slike[1]= new Image();slike[1].src="2.jpg";slike[2]= new Image();slike[2].src="3.jpg";var vrijeme;var indeks=0;function zamjenisliku(){	window.document.mojaslika.src=slike[indeks].src;	indeks++	if (indeks >=slike.length)	{		indeks=0;	}	vrijeme=setTimeout("zamjenisliku();",500);}</SCRIPT></HEAD><BODY ><img name="mojaslika" src="prva.jpg" height="300" ><FORM><input type="button" value="Pokreni prezentaciju" onClick="clearTimeout(vrijeme); zamjenisliku();"><input type="button" value="Zaustavi prezentaciju" onClick="clearTimeout(vrijeme);"></FORM></BODY></HTML>
