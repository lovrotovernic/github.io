<HTML>
<HEAD>
<TITLE>JavaScript event</TITLE>
<script language="JavaScript">
var loader=new Image();
loader.src="dexter.png";
</script>
</HEAD>
<BODY>
<a href="#"
onMouseOver="window.document.dexter2.src=loader.src;"
onMouseOut="window.document.dexter2.src='doakes.webp';">
<img src="dexter.png" name="dexter2" border="0" height="200" width="200"></a>
</BODY>
</HTML>
