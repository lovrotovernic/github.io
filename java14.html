<!DOCTYPE html>
<html>
<head>
    <title>Petlja u petlji</title>
</head>

<body>

<h3>Odaberi broj redaka i stupaca</h3>

<!-- Drop lista za retke -->
Redci:
<select id="redci">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
    <option value="6">6</option>
    <option value="7">7</option>
    <option value="8">8</option>
    <option value="9">9</option>
    <option value="10">10</option>
</select>

<!-- Drop lista za stupce -->
Stupci:
<select id="stupci">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
    <option value="6">6</option>
    <option value="7">7</option>
    <option value="8">8</option>
    <option value="9">9</option>
    <option value="10">10</option>
</select>

<button onclick="ispisi()">Prikaži</button>

<hr>

<div id="rezultat"></div>

<script>

function ispisi()
{
    // Dohvaćanje vrijednosti iz drop lista
    var redci = document.getElementById("redci").value;
    var stupci = document.getElementById("stupci").value;

    var tekst = "";

    for (var i = 0; i < redci; i++)
    {
        for (var j = 0; j < stupci; j++)
        {
            tekst += "Poznanovec ";
        }

        tekst += "<br>";
    }

    // Ispis rezultata
    document.getElementById("rezultat").innerHTML = tekst;
}

</script>

</body>
</html>
